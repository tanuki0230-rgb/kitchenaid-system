<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Check Data</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>ข้อมูลใน localStorage</h2>
<div id="out"></div>
<script>
const keys = ['ka_quotations','ka_invoices','ka_repairs','ka_parts','ka_settings','ka_worker_url','ka_api_key'];
let html = '';
keys.forEach(k => {
  const v = localStorage.getItem(k);
  if (!v) { html += `<p><b>${k}</b>: <span style="color:red">ไม่มีข้อมูล</span></p>`; return; }
  try {
    const parsed = JSON.parse(v);
    const count = Array.isArray(parsed) ? parsed.length + ' รายการ' : 'Object';
    html += `<p><b>${k}</b>: <span style="color:green">${count}</span></p>`;
  } catch(e) {
    html += `<p><b>${k}</b>: ${v.slice(0,80)}</p>`;
  }
});
document.getElementById('out').innerHTML = html;
</script>
</body>
</html>
